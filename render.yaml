services:
  - type: web
    name: ribbontex-dashboard
    runtime: docker
    plan: starter
    healthCheckPath: /
    disk:
      name: ribbontex-data
      mountPath: /app/server/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: TZ
        value: Asia/Amman
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: OWNER_PASSWORD
        sync: false
      - key: CLIENT_ORIGIN
        sync: false
